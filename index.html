<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Search Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e2e8f0;
    --muted: #64748b;
    --card: #0d1526;
    --highlight: rgba(0, 212, 255, 0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.6s ease;
  }

  .header .badge {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* Search Box */
  .search-wrap {
    position: relative;
    margin-bottom: 30px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 18px;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 20px 20px 20px 54px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.12), 0 0 20px rgba(0,212,255,0.08);
  }

  #searchInput::placeholder { color: var(--muted); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 2px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .stats-bar span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .stats-bar .count {
    color: var(--accent);
    font-weight: 700;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .tab {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .tab.active, .tab:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.07);
  }

  /* Results */
  #results {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .student-card {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    cursor: default;
  }

  .student-card:hover {
    border-color: rgba(0,212,255,0.4);
    background: var(--highlight);
    transform: translateX(4px);
  }

  .student-card .serial {
    font-size: 11px;
    color: var(--accent);
    text-align: center;
    font-weight: 700;
    border: 1px solid rgba(0,212,255,0.25);
    padding: 6px 4px;
    border-radius: 3px;
    background: rgba(0,212,255,0.05);
    letter-spacing: 0;
  }

  .student-card .info { overflow: hidden; }

  .student-card .name {
    font-size: 14px;
    font-weight: 700;
    color: #f0f6ff;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .student-card .ids {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .student-card .id-badge {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .student-card .id-badge span {
    color: var(--accent2);
    font-weight: 700;
  }

  .student-card .rank {
    font-size: 22px;
    color: var(--border);
    font-weight: 700;
    text-align: right;
    user-select: none;
  }

  /* Highlight matched text */
  mark {
    background: rgba(255, 107, 53, 0.3);
    color: #ffb085;
    border-radius: 2px;
    padding: 0 2px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty .emoji { font-size: 48px; margin-bottom: 16px; display: block; }
  .empty p { font-size: 12px; letter-spacing: 1px; }

  /* No search state */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .welcome .big { font-size: 56px; margin-bottom: 20px; display: block; }
  .welcome p { font-size: 12px; letter-spacing: 1px; line-height: 2; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  .student-card { animation: pop 0.2s ease; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">Student Database</div>
    <h1>Student Search Engine</h1>
    <p>Search by Roll · Registration · Name</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="নাম, রোল বা রেজিস্ট্রেশন নম্বর লিখুন..." autocomplete="off" autofocus>
  </div>

  <div class="filter-tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="name">Name only</button>
    <button class="tab" data-filter="roll">Roll only</button>
    <button class="tab" data-filter="reg">Reg. only</button>
  </div>

  <div class="stats-bar">
    <span>Total: <span class="count" id="totalCount">211</span> students</span>
    <span id="resultCount"></span>
  </div>

  <div id="results">
    <div class="welcome">

    </div>
  </div>

</div>

let activeFilter = 'all';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.filter;
    doSearch();
  });
});

document.getElementById('searchInput').addEventListener('input', doSearch);

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function doSearch() {
  const raw = document.getElementById('searchInput').value.trim();
  const q = raw.toLowerCase();
  const resultsEl = document.getElementById('results');
  const countEl = document.getElementById('resultCount');

  if (!q) {
    resultsEl.innerHTML = `<div class="welcome"><span class="big">🔍</span><p>Search করুন নাম, রোল নম্বর বা<br>রেজিস্ট্রেশন নম্বর দিয়ে।<br><br>ছোট বা বড় হাতের অক্ষর — কোনো সমস্যা নেই।</p></div>`;
    countEl.textContent = '';
    return;
  }

  const matched = students.filter(s => {
    if (activeFilter === 'name') return s.name.toLowerCase().includes(q);
    if (activeFilter === 'roll') return s.roll.includes(q);
    if (activeFilter === 'reg')  return s.reg.includes(q);
    return s.name.toLowerCase().includes(q) || s.roll.includes(q) || s.reg.includes(q);
  });

  countEl.textContent = `Found: ${matched.length}`;

  if (matched.length === 0) {
    resultsEl.innerHTML = `<div class="empty"><span class="emoji">😕</span><p>কোনো ফলাফল পাওয়া যায়নি।<br>অন্য কিছু দিয়ে চেষ্টা করুন।</p></div>`;
    return;
  }

  resultsEl.innerHTML = matched.map((s, i) => `
    <div class="student-card">
      <div class="serial">#${String(i+1).padStart(2,'0')}</div>
      <div class="info">
        <div class="name">${highlight(s.name, raw)}</div>
        <div class="ids">
          <div class="id-badge">Roll: <span>${highlight(s.roll, raw)}</span></div>
          <div class="id-badge">Reg: <span>${highlight(s.reg, raw)}</span></div>
        </div>
      </div>
      <div class="rank">${i+1}</div>
    </div>
  `).join('');
}
